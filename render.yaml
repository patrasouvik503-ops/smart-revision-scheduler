services:
  - type: web
    name: smart-revision-backend
    runtime: docker
    rootDir: backend
    plan: starter
    envVars:
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_ENABLED
        value: true
      - key: APP_CORS_ALLOWED_ORIGIN
        sync: false
  - type: web
    name: smart-revision-frontend
    runtime: docker
    rootDir: frontend
    plan: starter
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
